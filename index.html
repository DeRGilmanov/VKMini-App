<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant Bot</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #0077ff;
        }
        .stat {
            font-size: 32px;
            font-weight: bold;
            color: #0077ff;
        }
        button {
            background: #0077ff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🤖 AI Assistant Bot</h1>
            <p>Интеллектуальный анализ групповых чатов</p>
        </div>
        
        <div class="card">
            <h2>📊 Статистика</h2>
            <div id="stats">Загрузка...</div>
        </div>
        
        <div class="card">
            <h2>❓ Задать вопрос</h2>
            <textarea id="question" rows="3" placeholder="Введите вопрос по истории чата..."></textarea>
            <button onclick="ask()">Спросить</button>
            <div id="answer" style="margin-top: 10px;"></div>
        </div>
    </div>

    <script>
        let currentPeerId = 2000000001;
        
        async function loadStats() {
            try {
                const response = await fetch(`/api/stats?peer_id=${currentPeerId}`);
                const data = await response.json();
                document.getElementById('stats').innerHTML = `
                    <div class="stat">${data.total_messages}</div>
                    <div>всего сообщений</div>
                    <div class="stat">${data.unique_users}</div>
                    <div>участников</div>
                `;
            } catch (error) {
                document.getElementById('stats').innerHTML = 'Ошибка загрузки';
            }
        }
        
        async function ask() {
            const question = document.getElementById('question').value;
            if (!question) return;
            
            document.getElementById('answer').innerHTML = '⏳ Думаю...';
            
            try {
                const response = await fetch('/api/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: question, peer_id: currentPeerId })
                });
                const data = await response.json();
                document.getElementById('answer').innerHTML = data.answer;
            } catch (error) {
                document.getElementById('answer').innerHTML = '❌ Ошибка';
            }
        }
        
        loadStats();
    </script>
</body>
</html>
